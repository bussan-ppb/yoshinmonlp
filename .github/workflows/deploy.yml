# 段階デプロイ用ワークフロー
# - main への push → gh-pages の /preview/ サブディレクトリに自動反映（師範レビュー用）
# - 手動実行（workflow_dispatch）→ main HEAD を本番ルートに公開
#
# プレビューURL: https://yoshinmon-official.jp/preview/
# 本番URL:     https://yoshinmon-official.jp/
name: Deploy

on:
  # main への push を契機に /preview/ を自動更新
  push:
    branches: [main]
  # 手動実行: GitHub の Actions タブから「Run workflow」で本番公開
  workflow_dispatch:

permissions:
  # gh-pages ブランチへの書き込み権限
  contents: write

# 同時実行を制御
concurrency:
  group: pages-deploy
  # 本番公開ジョブはキャンセルしない（事故防止）
  cancel-in-progress: false

jobs:
  # ===== 自動: main push → /preview/ サブディレクトリにデプロイ =====
  preview:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: mainをチェックアウト
        uses: actions/checkout@v4

      - name: /preview/ にデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # gh-pages の /preview/ サブディレクトリに配置
          destination_dir: preview
          # /preview/ 以下の旧ファイルは保持（差分のみ更新）
          keep_files: true
          # 開発用ファイルは公開しない
          exclude_assets: '.github,.gitignore,.claude,CLAUDE.md,README.md,.DS_Store'
          commit_message: 'preview: ${{ github.event.head_commit.message }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  # ===== 手動: workflow_dispatch → main HEAD を本番ルートに公開 =====
  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: mainをチェックアウト
        uses: actions/checkout@v4

      - name: 本番ルートに公開
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # 本番固有ファイル（CNAME、option2/、preview/ など）を保持
          keep_files: true
          exclude_assets: '.github,.gitignore,.claude,CLAUDE.md,README.md,.DS_Store'
          commit_message: 'publish: 本番公開 (main ${{ github.sha }})'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
